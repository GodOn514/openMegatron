name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  python-and-frontend:
    name: Python tests and frontend build
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pysrc/requirements.txt

      - name: Compile Python
        shell: pwsh
        run: |
          python -m py_compile pysrc/agent.py pysrc/evolution.py scripts/data_admin.py scripts/runtime_setup.py scripts/llm_setup.py

      - name: Run Python tests
        shell: pwsh
        env:
          MEGATRON_SKIP_LLM_CHECK: "1"
          TQDM_DISABLE: "1"
          TRANSFORMERS_VERBOSITY: "error"
          TOKENIZERS_PARALLELISM: "false"
        run: |
          pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
